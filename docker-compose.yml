services:
  sadtalker:
    image: 300978239547.dkr.ecr.eu-north-1.amazonaws.com/sadtalker-inference:${IMAGE_TAG:-latest}
    # To build locally instead of pulling, uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-eu-north-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/ping').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  webapp:
    image: 300978239547.dkr.ecr.eu-north-1.amazonaws.com/sadtalker-webapp:${IMAGE_TAG:-latest}
    # To build locally instead of pulling, uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.webapp
    ports:
      - "5000:5000"
    environment:
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-eu-north-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      S3_BUCKET: ${S3_BUCKET:-sadtalker-demo-300978239547}
      INFERENCE_URL: http://sadtalker:8080
    volumes:
      - webapp-data:/data
    depends_on:
      sadtalker:
        condition: service_healthy
    restart: unless-stopped

volumes:
  webapp-data:
